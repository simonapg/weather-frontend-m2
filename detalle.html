<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detalle de clima y pronóstico de una ciudad">
  <meta name="author" content="Desarrollador Web">
  <title>Detalle de Clima - ClimaMundo Chile</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="weather-app" data-page="detalle">
  <header class="weather-app__header" id="siteHeader"></header>
  <main class="weather-app__body">
    <div class="container" id="detalleContainer">
      <section id="detalleHeader" class="detail-header"></section>
      <section id="detalleActual" class="detail-grid"></section>
      <section id="pronosticoContainer" class="forecast"></section>
      <div class="text-center my-5">
        <button class="btn btn-primary btn-lg" id="botonVolverInicio">
          Volver al inicio
        </button>
      </div>
    </div>
  </main>
  <footer class="weather-footer" id="siteFooter"></footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/script.js"></script>
</body>
</html>
